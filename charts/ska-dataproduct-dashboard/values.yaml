---
ingress:
  enabled: true
  namespaced: true
  hostname: "https://sdhp.stfc.skao.int"

api:
  enabled: true
  container: artefact.skao.int/ska-dataproduct-api
  version: 0.15.1
  imagePullPolicy: IfNotPresent
  replicas: 1
  secretName: ska-dataproduct-dashboard-api-secret
  verbose: false
  dateFormat: "%Y-%m-%d"
  ingress:
    path: api
  storagePath: "/mnt/data/product/"
  metadataFileName: ska-data-product.yaml
  # Indexing tuning
  indexingTimeoutSeconds: 21600
  indexingBatchSize: 10
  # Number of threads for the parallel YAML read phase. Increase on high-latency NFS storage.
  indexingParallelWorkers: 8
  # SDP config database (etcd) host.  Leave empty to disable SDP flow enrichment.
  sdpConfigdbHost: ""
  # Seconds the SDP flow watcher waits for an etcd event before looping (heartbeat).
  sdpWatcherTimeoutSeconds: 30.0
  # Seconds to wait before reconnecting after an unexpected SDP flow watcher error.
  sdpWatcherReconnectDelaySeconds: 10.0
  # When true, mock SDP flow data is loaded on startup without a live etcd connection.
  # For development/testing only — never enable in production.
  useLocalTestData: false
  # Chunk size in bytes for streaming file downloads.
  streamChunkSize: 65536
  # Dashboard port used to build CORS allowed origins.
  dashboardPort: "8100"
  permissionsapi:
    serviceUrl: https://sdhp.stfc.skao.int/integration-ska-permissions-api
  postgresql:
    host: ""
    port: 5432
    user: "postgres"
    password: ""
    dbname: ""
    schema: ""
    metadataTableName: "dpd_metadata_table"
    annotationsTableName: "dpd_annotations_table"
    sdpFlowsTableName: "dpd_sdp_flows_table"
    dlmInterfaceEnabled: false
    dlmSchema: "dlm"
    dlmMetadataTableName: "data_item"
    querySizeLimit: 10000
  resources:
    requests:
      cpu: 200m
      memory: 200Mi
    limits:
      cpu: 1000m
      memory: 600Mi

dashboard:
  enabled: true
  container: artefact.skao.int/ska-dataproduct-dashboard
  version: 0.16.0
  imagePullPolicy: IfNotPresent
  secretName: ska-dataproduct-dashboard-dashboard-secret
  ingress:
    path: dashboard
  dataGridDefaultPageSize: 25
  apiRefreshRate: 10000
  resources:
    requests:
      cpu: 1000m
      memory: 2048Mi
    limits:
      cpu: 2000m
      memory: 3072Mi

dataProductPVC:
  enabled: true
  name: shared
  create:
    enabled: false
    size: 5Gi
    storageClassName: nfss1

# Vault secret synchronization (subchart)
vault-secret-sync:
  enabled: false
  vault:
    engine: "dev"
    refreshAfter: 360s
  secrets:
    dashboard:
      vaultPath: "phoenix/sdhp-stfc/integration/ska-dataproduct-dashboard"
      secretName: "ska-dataproduct-dashboard-dashboard-secret"
      keys:
        - REACT_APP_MSENTRA_CLIENT_ID
        - REACT_APP_MSENTRA_TENANT_ID
    api:
      vaultPath: "phoenix/sdhp-stfc/integration/ska-sdp-dataproduct-api"
      secretName: "ska-dataproduct-dashboard-api-secret"
      keys:
        - SKA_DATAPRODUCT_API_POSTGRESQL_PASSWORD
