{{- if $.Values.api.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Chart.Name }}-api-service
  labels:
{{ include "ska-dataproduct-dashboard.api.labels" . | indent 4 }}
spec:
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
  clusterIP: None
  selector:
{{ include "ska-dataproduct-dashboard.api.labels" . | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ska-dataproduct-api
  labels:
{{ include "ska-dataproduct-dashboard.api.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.api.replicas | default 1 }}
  selector:
    matchLabels:
{{ include "ska-dataproduct-dashboard.api.labels" . | indent 6 }}
  template:
    metadata:
      labels:
{{ include "ska-dataproduct-dashboard.api.labels" . | indent 8 }}
    spec:
{{- if $.Values.dataProductPVC.enabled }}
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: {{ include "dataProductPVCName" . }}
{{- end }}
      restartPolicy: Always
      terminationGracePeriodSeconds: 10
      containers:
      - name: ska-dataproduct-api
        image: "{{ .Values.api.container }}:{{ .Values.api.version }}"
        imagePullPolicy: {{ .Values.api.imagePullPolicy }}
        resources:
          limits:
            cpu: {{ .Values.api.resources.limits.cpu }}
            memory: {{ .Values.api.resources.limits.memory }}
          requests:
            cpu: {{ .Values.api.resources.requests.cpu }}
            memory: {{ .Values.api.resources.requests.memory }}
        ports:
          - containerPort: 8000
{{- if $.Values.dataProductPVC.enabled }}
        volumeMounts:
          - mountPath: "/mnt/data"
            name: shared-storage
{{- end }}
        terminationMessagePath: "/dev/termination-log"
        terminationMessagePolicy: "File"
        env:
          - name: API_VERBOSE
            value: "{{ .Values.api.verbose }}"
          - name: PERSISTENT_STORAGE_PATH
            value: "{{ .Values.api.storagePath }}"
          - name: PVCNAME
            value: "{{ .Values.dataProductPVC.name }}"
          - name: REACT_APP_SKA_DATAPRODUCT_DASHBOARD_URL
            value: {{ include "ska-dataproduct-dashboard.dashboard.ingress.path" . }}
          - name: REACT_APP_SKA_DATAPRODUCT_DASHBOARD_PORT
            value: "{{ .Values.api.dashboardPort | default "8100" }}"
          - name: METADATA_FILE_NAME
            value: "{{ .Values.api.metadataFileName }}"
          - name: SKA_DATAPRODUCT_API_VERSION
            value: "{{ .Values.api.version }}"
          - name: STREAM_CHUNK_SIZE
            value: "{{ .Values.api.streamChunkSize | default 65536 }}"
          - name: DATE_FORMAT
            value: "{{ .Values.api.dateFormat }}"
          - name: API_ROOT_PATH
            value: {{ include "ska-dataproduct-dashboard.api.ingress.path" . }}
          - name: SDP_CONFIG_HOST
            value: {{ .Values.api.sdpConfigdbHost | quote }}
          - name: SKA_DATAPRODUCT_API_SDP_WATCHER_TIMEOUT_SECONDS
            value: "{{ .Values.api.sdpWatcherTimeoutSeconds | default 30.0 }}"
          - name: SKA_DATAPRODUCT_API_SDP_WATCHER_RECONNECT_DELAY_SECONDS
            value: "{{ .Values.api.sdpWatcherReconnectDelaySeconds | default 10.0 }}"
          - name: USE_LOCAL_TEST_DATA
            value: "{{ .Values.api.useLocalTestData | default false }}"
          - name: INDEXING_TIMEOUT_SECONDS
            value: "{{ .Values.api.indexingTimeoutSeconds }}"
          - name: INDEXING_BATCH_SIZE
            value: "{{ .Values.api.indexingBatchSize }}"
          - name: INDEXING_PARALLEL_WORKERS
            value: "{{ .Values.api.indexingParallelWorkers | default 8 }}"
          - name: SKA_PERMISSIONS_API_HOST
            value: "{{ .Values.api.permissionsapi.serviceUrl }}"
          - name: SKA_DATAPRODUCT_API_POSTGRESQL_HOST
            value: "{{ .Values.api.postgresql.host }}"
          - name: SKA_DATAPRODUCT_API_POSTGRESQL_PORT
            value: "{{ .Values.api.postgresql.port }}"
          - name: SKA_DATAPRODUCT_API_POSTGRESQL_USER
            value: "{{ .Values.api.postgresql.user }}"
          - name: SKA_DATAPRODUCT_API_POSTGRESQL_DBNAME
            value: "{{ .Values.api.postgresql.dbname }}"
          - name: SKA_DATAPRODUCT_API_POSTGRESQL_SCHEMA
            value: "{{ .Values.api.postgresql.schema }}"
          - name: SKA_DATAPRODUCT_API_POSTGRESQL_METADATA_TABLE_NAME
            value: "{{ .Values.api.postgresql.metadataTableName }}"
          - name: SKA_DATAPRODUCT_API_POSTGRESQL_ANNOTATIONS_TABLE_NAME
            value: "{{ .Values.api.postgresql.annotationsTableName }}"
          - name: SKA_DATAPRODUCT_API_DPD_SDP_FLOWS_TABLE_NAME
            value: "{{ .Values.api.postgresql.sdpFlowsTableName | default "dpd_sdp_flows_table" }}"
          - name: SKA_DATAPRODUCT_API_POSTGRESQL_QUERY_SIZE_LIMIT
            value: "{{ .Values.api.postgresql.querySizeLimit }}"
          - name: SKA_DATAPRODUCT_DLM_INTERFACE_ENABLED
            value: "{{ .Values.api.postgresql.dlmInterfaceEnabled }}"
          - name: SKA_DATAPRODUCT_API_POSTGRESQL_DLM_SCHEMA
            value: "{{ .Values.api.postgresql.dlmSchema }}"
          - name: SKA_DATAPRODUCT_API_POSTGRESQL_DLM_METADATA_TABLE_NAME
            value: "{{ .Values.api.postgresql.dlmMetadataTableName }}"
          - name: SKA_DATAPRODUCT_API_POSTGRESQL_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.api.secretName }}
                key: SKA_DATAPRODUCT_API_POSTGRESQL_PASSWORD
        # The API is immediately available after startup even while indexing runs in the
        # background.  A short startup delay avoids premature liveness failures on pods
        # with large PVCs where uvicorn takes a moment to bind.
        startupProbe:
          httpGet:
            path: /status
            port: 8000
          failureThreshold: 12
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /status
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /status
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
{{- end }}
